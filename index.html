<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AI Store</h1>
        <div class="search-container">
            <input type="text" id="search-box" placeholder="Search for AI tools...">
        </div>
    </header>
    <main id="ai-tools-grid" class="grid-container">
        <!-- AI tools will be dynamically added here -->
    </main>
    <footer>
        <p>&copy; 2024 AI Store. All rights reserved.</p>
    </footer>
    <div id="dialog" class="dialog" style="display: none;">
        <div class="dialog-content">
            <span class="close-button">&times;</span>
            <h2 id="dialog-title"></h2>
            <p id="dialog-description"></p>
            <div id="dialog-youtube-links"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
